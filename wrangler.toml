name = "echo-appointments"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "echo-appointments"
database_id = "e8e84485-02e3-44b2-a5c9-aa892c5c7a2f"

[[kv_namespaces]]
binding = "CACHE"
id = "5fe485c65bd74da492a38d25431dd5d5"

[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "EMAIL_SENDER"
service = "echo-email-sender"

[triggers]
crons = ["*/15 * * * *"]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
